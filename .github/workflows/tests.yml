name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt coverage coverage-badge setuptools

      - name: Run tests with coverage
        run: |
          coverage run --source=firmeza/tracker manage.py test firmeza.tracker
          coverage report --omit="firmeza/tracker/migrations/*"

      - name: Generate coverage badge
        run: coverage-badge -o coverage.svg -f

      - name: Commit badge if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: coverage.svg
