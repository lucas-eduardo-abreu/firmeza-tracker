services:
  - type: web
    name: firmeza-tracker
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn firmeza.wsgi"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "firmeza-tracker.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: firmeza-db
          property: connectionString

databases:
  - name: firmeza-db
    databaseName: firmeza
    user: firmeza
